name: Cap nhat so lieu Sale

on:
  workflow_dispatch: {}
  # Lịch tự chạy do Cloudflare Cron kích (reliable hơn cron GitHub) — xem sale-mess-worker

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Tai file hien tai (de merge tich luy tuong tac + tags)
        run: |
          curl -s "https://sale-mess-th.pages.dev/data.js" -o public/data.js || true
          curl -s "https://sale-mess-th.pages.dev/tags.js" -o public/tags.js || true
          curl -s "https://sale-mess-th.pages.dev/meta.js" -o public/meta.js || true

      - name: Pull don + tags + meta
        shell: pwsh
        env:
          TZ: Asia/Ho_Chi_Minh
          PANCAKE_TOKEN: ${{ secrets.PANCAKE_TOKEN }}
          META_TOKEN: ${{ secrets.META_TOKEN }}
          POS_APIKEY: ${{ secrets.POS_APIKEY }}
          POS_APIKEY_ID: ${{ secrets.POS_APIKEY_ID }}
        run: |
          ./scripts/refresh.ps1
          ./scripts/pull_tags.ps1
          # Meta kéo THƯA hơn (chỉ ~mỗi giờ, khi phút < 20) để token Meta hồi, tránh throttle.
          # Các run khác giữ nguyên meta.js đã tải về (không regenerate).
          if((Get-Date).Minute -lt 20){ ./scripts/pull_meta.ps1 } else { Write-Host "Bo qua pull_meta lan nay (chi keo moi gio de token Meta hoi)" -ForegroundColor Yellow }

      - name: Deploy Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest pages deploy public --project-name=sale-mess-th --branch=main --commit-dirty=true
